name: release

# Build Dissertator desktop apps (Linux, macOS x64 + arm64, Windows) on git tag,
# then publish all installers to a GitHub Release.
#
# Each platform runner builds its OWN sidecar binary natively — bun `--compile`
# can't cross-compile native modules (sqlite-vec, tesseract.js). The built
# sidecar is placed at the target-triple path Tauri's `externalBin` expects,
# then `tauri build` bundles it next to the app executable.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            triple: x86_64-unknown-linux-gnu
          - os: macos-13
            name: macos-x64
            triple: x86_64-apple-darwin
          - os: macos-14
            name: macos-arm64
            triple: aarch64-apple-darwin
          - os: windows-latest
            name: windows-x64
            triple: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build sidecar binary (native)
        run: bun --filter sidecar build

      - name: Place sidecar at externalBin target-triple path
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          ext=""
          if [[ "${{ matrix.triple }}" == *windows* ]]; then ext=".exe"; fi
          src="sidecar/dist/dissertator-sidecar${ext}"
          if [ ! -f "$src" ]; then src="sidecar/dist/dissertator-sidecar"; fi
          test -f "$src" || { echo "sidecar binary not found at $src"; exit 1; }
          cp "$src" "src-tauri/binaries/dissertator-sidecar-${{ matrix.triple }}${ext}"
          echo "Placed: src-tauri/binaries/dissertator-sidecar-${{ matrix.triple }}${ext}"

      - name: Build Tauri app (native)
        shell: bash
        run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dissertator-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect installers
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o \
            -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} release/ \;
          echo "::group::Release files"
          ls -la release/
          echo "::endgroup::"

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
